name: Release (Tauri desktop bundles)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  desktop:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 11 is x64 or ARM64 only. This x86 package is for legacy
          # 32-bit Windows systems; it keeps proofreading available but omits
          # the optional native llama.cpp engine.
          - name: Windows x86 (32-bit legacy)
            runner: windows-2025
            platform: windows
            target: i686-pc-windows-msvc
            python_arch: x86
            cmake_args: "-DCMAKE_GENERATOR_PLATFORM=Win32 -DGGML_NATIVE=OFF"
            include_llama: "false"
            jre_url: https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.17%2B10/OpenJDK17U-jre_x86-32_windows_hotspot_17.0.17_10.zip
            jre_archive: jre.zip
            bundle: nsis
            extension: exe
            artifact_name: lexicon-windows-x86

          - name: Windows x64
            runner: windows-2025
            platform: windows
            target: x86_64-pc-windows-msvc
            python_arch: x64
            cmake_args: "-DCMAKE_GENERATOR_PLATFORM=x64 -DGGML_NATIVE=OFF"
            include_llama: "true"
            jre_url: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_windows_hotspot_21.0.5_11.zip
            jre_archive: jre.zip
            bundle: nsis
            extension: exe
            artifact_name: lexicon-windows-x64

          - name: Windows ARM64
            runner: windows-11-arm
            platform: windows
            target: aarch64-pc-windows-msvc
            python_arch: arm64
            # No prebuilt llama-cpp-python wheel for win_arm64, and llama.cpp
            # refuses to compile with MSVC on ARM ("use clang"). Like the x86
            # legacy job, omit the native engine here; proofreading still works
            # fully offline. Revisit if official win_arm64 wheels appear.
            cmake_args: "-DCMAKE_GENERATOR_PLATFORM=ARM64 -DGGML_NATIVE=OFF"
            include_llama: "false"
            jre_url: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_aarch64_windows_hotspot_21.0.5_11.zip
            jre_archive: jre.zip
            bundle: nsis
            extension: exe
            artifact_name: lexicon-windows-arm64

          - name: macOS Intel
            runner: macos-15-intel
            platform: macos
            target: x86_64-apple-darwin
            python_arch: x64
            cmake_args: "-DGGML_NATIVE=OFF -DCMAKE_OSX_ARCHITECTURES=x86_64"
            include_llama: "true"
            jre_url: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_mac_hotspot_21.0.5_11.tar.gz
            jre_archive: jre.tar.gz
            bundle: app,dmg
            extension: dmg
            artifact_name: lexicon-macos-x64

          - name: macOS Apple Silicon
            runner: macos-15
            platform: macos
            target: aarch64-apple-darwin
            python_arch: arm64
            cmake_args: "-DGGML_NATIVE=OFF -DCMAKE_OSX_ARCHITECTURES=arm64"
            include_llama: "true"
            jre_url: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_aarch64_mac_hotspot_21.0.5_11.tar.gz
            jre_archive: jre.tar.gz
            bundle: app,dmg
            extension: dmg
            artifact_name: lexicon-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python_arch }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Windows build tooling
        if: matrix.platform == 'windows'
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            choco install cmake --yes --no-progress
          fi

      - name: Install macOS build tooling
        if: matrix.platform == 'macos'
        run: |
          if ! brew list cmake >/dev/null 2>&1; then
            brew install cmake
          fi

      - name: Freeze backend sidecar (onedir)
        working-directory: backend
        env:
          CMAKE_ARGS: ${{ matrix.cmake_args }}
          LEXICON_INCLUDE_LLAMA: ${{ matrix.include_llama }}
        run: |
          python -m pip install -r requirements.txt pyinstaller huggingface-hub==0.29.3
          if [[ "${LEXICON_INCLUDE_LLAMA}" == "true" ]]; then
            python -m pip install llama-cpp-python==0.3.34
          fi
          pyinstaller lexicon.spec --noconfirm --clean
          rm -rf ../frontend/src-tauri/lexicon-backend
          cp -r dist/lexicon-backend ../frontend/src-tauri/lexicon-backend
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            chmod +x ../frontend/src-tauri/lexicon-backend/lexicon-backend
          fi

      - name: Bundle Windows JRE
        if: matrix.platform == 'windows'
        working-directory: backend
        run: |
          curl -L --fail --retry 5 --retry-all-errors --retry-delay 3 -o "${{ matrix.jre_archive }}" "${{ matrix.jre_url }}"
          python - <<'PY'
          import os
          import shutil
          import zipfile

          archive = os.environ["JRE_ARCHIVE"]
          with zipfile.ZipFile(archive) as z:
              z.extractall(".")
          top = next(d for d in os.listdir(".") if d.startswith("jdk-17") or d.startswith("jdk-21"))
          dest = "../frontend/src-tauri/jre"
          if os.path.isdir(dest):
              shutil.rmtree(dest)
          shutil.move(top, dest)
          os.remove(archive)
          PY
        env:
          JRE_ARCHIVE: ${{ matrix.jre_archive }}

      - name: Bundle macOS JRE
        if: matrix.platform == 'macos'
        working-directory: backend
        run: |
          curl -L --fail --retry 5 --retry-all-errors --retry-delay 3 -o "${{ matrix.jre_archive }}" "${{ matrix.jre_url }}"
          tar -xzf "${{ matrix.jre_archive }}"
          rm -rf ../frontend/src-tauri/jre
          mv jdk-21*/ ../frontend/src-tauri/jre
          rm "${{ matrix.jre_archive }}"

      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync release version
        working-directory: frontend
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"].removeprefix("v")
          config_path = Path("src-tauri/tauri.conf.json")
          config = json.loads(config_path.read_text(encoding="utf-8"))
          config["version"] = version
          config_path.write_text(
              json.dumps(config, indent=2) + "\n", encoding="utf-8"
          )

          cargo_path = Path("src-tauri/Cargo.toml")
          cargo = cargo_path.read_text(encoding="utf-8")
          cargo, replacements = re.subn(
              r'(?m)^(version\s*=\s*")[^"]+("\s*)$',
              rf'\g<1>{version}\g<2>',
              cargo,
              count=1,
          )
          if replacements != 1:
              raise SystemExit("Could not update the Tauri package version")
          cargo_path.write_text(cargo, encoding="utf-8")
          PY

      - name: Verify updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is not configured in repository secrets."
            exit 1
          fi

      - name: Tauri build (${{ matrix.bundle }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_APP_VERSION: ${{ github.ref_name }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Stage installer and updater artifacts
        run: |
          set -euo pipefail
          source_dir="frontend/src-tauri/target/${{ matrix.target }}/release/bundle"
          output_dir="release-assets/${{ matrix.artifact_name }}"
          mkdir -p "$output_dir"
          find "$source_dir" -type f \( \
            -name "*.exe" -o -name "*.exe.sig" -o \
            -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
          \) -exec cp {} "$output_dir/" \;
          if [ -f "$output_dir/Lexicon.app.tar.gz" ]; then
            mv "$output_dir/Lexicon.app.tar.gz" "$output_dir/${{ matrix.artifact_name }}.app.tar.gz"
          fi
          if [ -f "$output_dir/Lexicon.app.tar.gz.sig" ]; then
            mv "$output_dir/Lexicon.app.tar.gz.sig" "$output_dir/${{ matrix.artifact_name }}.app.tar.gz.sig"
          fi
          test -n "$(find "$output_dir" -type f -print -quit)"

      - name: Upload installer and updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/${{ matrix.artifact_name }}/*
          if-no-files-found: error

  release:
    needs: [desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate updater manifest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          version = tag.removeprefix("v")
          repository = os.environ["REPOSITORY"]
          root = Path("artifacts")
          targets = {
              "windows-x86_64": ("lexicon-windows-x64", "*.exe"),
              "windows-aarch64": ("lexicon-windows-arm64", "*.exe"),
              "windows-i686": ("lexicon-windows-x86", "*.exe"),
              "darwin-x86_64": ("lexicon-macos-x64", "*.app.tar.gz"),
              "darwin-aarch64": ("lexicon-macos-arm64", "*.app.tar.gz"),
          }
          platforms = {}
          for target, (folder, pattern) in targets.items():
              candidates = sorted((root / folder).glob(pattern))
              if len(candidates) != 1:
                  raise SystemExit(f"Expected one updater artifact for {target}, found: {candidates}")
              artifact = candidates[0]
              signature = Path(f"{artifact}.sig")
              if not signature.is_file():
                  raise SystemExit(f"Missing updater signature: {signature}")
              platforms[target] = {
                  "signature": signature.read_text(encoding="utf-8").strip(),
                  "url": f"https://github.com/{repository}/releases/download/{tag}/{artifact.name}",
              }

          manifest = {
              "version": version,
              "notes": f"Lexicon {tag} update",
              "pub_date": datetime.now(timezone.utc).isoformat(),
              "platforms": platforms,
          }
          (root / "latest.json").write_text(
              json.dumps(manifest, indent=2) + "\n", encoding="utf-8"
          )
          print(json.dumps(manifest, indent=2))
          PY

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: Lexicon ${{ github.ref_name }}
          body: |
            ## Lexicon ${{ github.ref_name }}

            Privacy-first grammar and AI writing assistant. Runs locally on
            your computer; the local model downloads on first use.

            ### Downloads
            - **Windows x64**: 64-bit Intel/AMD Windows
            - **Windows ARM64**: Windows on ARM; proofreading is supported,
              but the optional native AI engine is not bundled
            - **Windows x86**: legacy 32-bit Windows; proofreading is supported,
              but the optional native AI engine is not bundled
            - **macOS Intel**: Intel Macs
            - **macOS Apple Silicon**: M-series Macs

            macOS builds are unsigned. On first open, right-click the app and
            choose Open, or run:
            `xattr -dr com.apple.quarantine /Applications/Lexicon.app`

            On first launch the app downloads the local AI model (~1.4 GB for
            the 2B tier). Proofreading works immediately without it.

            Lexicon checks for updates in the app. Downloaded models and
            app data are kept outside the installation directory.
          files: |
            artifacts/lexicon-windows-x86/*
            artifacts/lexicon-windows-x64/*
            artifacts/lexicon-windows-arm64/*
            artifacts/lexicon-macos-x64/*
            artifacts/lexicon-macos-arm64/*
            artifacts/latest.json

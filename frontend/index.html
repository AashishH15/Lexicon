<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexicon</title>
    <link rel="icon" type="image/png" href="/lexicon-logo.png" />
    <style>
      :root,
      body {
        margin: 0;
        min-height: 100%;
        background: #f7f7f5;
      }

      #root {
        min-height: 100vh;
      }

      .lexicon-boot-screen {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #787774;
        font-family: Georgia, serif;
      }

      .lexicon-boot-screen strong {
        color: #111111;
        font-size: 28px;
        font-weight: 500;
      }

      .lexicon-boot-screen span {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
  </head>
  <body>
    <div id="root">
      <div class="lexicon-boot-screen" role="status" aria-live="polite">
        <strong>Lexicon</strong>
        <span>Starting local workspace&hellip;</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
